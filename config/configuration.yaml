# Helpers
input_number:
  presence_delay:
    name: Presence Delay
    min: 1
    max: 120
    step: 1
    unit_of_measurement: seconds
    icon: mdi:timer-outline
    initial: 5
  tv_time_transition_duration:
    name: TV Time Transition Duration
    min: 0
    max: 60
    step: 1
    unit_of_measurement: seconds
    icon: mdi:timer-outline
    initial: 11

input_datetime:
  daytime_start:
    name: Daytime Start
    has_date: false
    has_time: true
    icon: mdi:weather-sunset-up
    initial: "06:00:00"
  nighttime_start:
    name: Nighttime Start
    has_date: false
    has_time: true
    icon: mdi:weather-sunset-down
    initial: "23:00:00"
  airversa_last_purge:
    name: Airversa Last Purge
    has_date: true
    has_time: true
    icon: mdi:air-purifier

# Matter Server Health Monitoring
# Counts Matter nodes that are genuinely stuck — failed subscription with
# no recovery for >30 minutes. Normal Thread mesh jitter (nodes that fail
# and self-recover within minutes) is ignored. Only reports nodes that
# likely need a Matter Server restart to recover.
# See: config/scripts/matter_stuck_nodes.py
command_line:
  - sensor:
      name: "Matter Subscription Failures"
      unique_id: matter_subscription_failures
      command: >-
        curl -sSf
        -H "Authorization: Bearer ${SUPERVISOR_TOKEN}"
        http://supervisor/addons/core_matter_server/logs
        2>/dev/null
        | python3 /config/scripts/matter_stuck_nodes.py
      scan_interval: 600
      value_template: "{{ value | int(0) }}"

