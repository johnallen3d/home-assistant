
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

# Light Groups
light:
  - platform: group
    name: Kitchen Lights
    entities:
      - light.island_bulb
      - light.sink_bulb
      - light.hue_lightstrip_plus_1
  - platform: group
    name: Island Lights
    entities:
      - light.island_bulb
      - light.sink_bulb
  - platform: group
    name: Dad's Overhead Lights
    entities:
      - light.bedroom_overhead_left
      - light.bedroom_overhead_right
  - platform: group
    name: Bedroom Lights
    entities:
      - light.bedroom_lamp
      - light.bedroom_overhead_left
      - light.bedroom_overhead_right
  - platform: group
    name: Bathroom Lights
    entities:
      - light.bathroom
      - light.bathroom_lamp
  - platform: group
    name: Living Room Overhead Light
    entities:
      - light.living_room_overhead_thread
      - light.living_room_overhead_wifi
  - platform: group
    name: Living Room Lights
    entities:
      - light.living_room_light
      - light.living_room_overhead_thread
      - light.living_room_overhead_wifi

# Mixed entity groups (lights + switches)
group:
  kitchen_all:
    name: Kitchen All
    entities:
      - light.island_bulb
      - light.sink_bulb
      - light.hue_lightstrip_plus_1
      - switch.kitchen_counter_switch

