# TV Mode Auto Handler
# Automatically sets tv_mode from the LG WebOS TV state.
#
# The boolean (input_boolean.tv_mode) tracks whether the TV is in active use:
# - Visible on dashboards as a toggle (for manual override)
# - Used by other automations to check if TV is active
#
# This automation handles state sync on any LG TV state change:
# - LG TV becomes active: Set tv_mode ON
# - LG TV becomes off / unavailable: Set tv_mode OFF
#
# Lighting is handled by automation.tv_time, which triggers from tv_mode.
# This keeps input_boolean.tv_mode authoritative, including manual toggles.
#
# Per mode conflict matrix, tv ON turns off:
# - hobby_mode (focus on TV, not projects)
# - meditation_mode (TV is not meditation)
#
# Protected modes preserve their own lighting behavior, but do not block
# tv_mode from reflecting actual TV activity:
# - babysitter_mode (sitter needs stable lights)
# - cooking_mode (don't disrupt kitchen lighting)
#
# Light/script side effects are guarded downstream (for example script.tv_time),
# so tv_mode can stay authoritative even while protected modes are active.

id: 'tv_mode_auto'
alias: "TV Mode Auto"
description: "Sets tv_mode based on LG WebOS TV state"
mode: restart

triggers:
  - trigger: state
    entity_id: media_player.lg_webos_tv_oled65c3aua
    id: tv_state_changed

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.to_state is not none and
                 trigger.to_state.state in
                 ['on', 'playing', 'paused', 'idle', 'standby', 'buffering'] }}
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.tv_mode
          # Per matrix: tv ON turns off hobby_mode, meditation_mode.
          # Disable related OFF handlers first to prevent them from clearing tv_mode.
          - action: automation.turn_off
            target:
              entity_id:
                - automation.hobby_mode_changed
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.hobby_mode
                - input_boolean.meditation_mode
          - action: automation.turn_on
            target:
              entity_id:
                - automation.hobby_mode_changed

      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.to_state is not none and
                 trigger.to_state.state in ['off', 'unavailable'] }}
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.tv_mode
