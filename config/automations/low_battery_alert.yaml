id: "1773587792555"
alias: "Low Battery Alert"
description: >-
  Send push notification when any device battery drops below 20%.
  Uses device_class battery sensors. Excludes phones, laptops, and
  rechargeable devices (vacuum, ember mugs) since those recharge.
triggers:
  - trigger: numeric_state
    entity_id:
      - sensor.kitchen_button_battery
      - sensor.bedside_button_battery
      - sensor.kitchen_counter_switch_battery
      - sensor.nuki_smart_lock_battery
      - sensor.laundry_room_switch_battery
      - sensor.bathroom_presence_sensor_battery
      - sensor.laundry_room_sensor_battery
    below: 20
conditions:
  - condition: template
    value_template: >-
      {{ trigger.to_state.state not in ['unavailable', 'unknown'] }}
actions:
  - action: notify.mobile_app_john_allens_iphone
    data:
      title: "Low Battery"
      message: >-
        {{ trigger.to_state.attributes.friendly_name }} is at {{ trigger.to_state.state }}%
      data:
        push:
          sound:
            name: default
            critical: 0
            volume: 0.5
mode: single
