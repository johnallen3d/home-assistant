# Babysitter Mode State Handler
# Reacts to babysitter_mode boolean changes to set soft, warm lighting
# in kitchen and living room and disable presence/motion automations
# so a sitter isn't surprised by lights turning on/off.
#
# Similar to cleaning mode but:
# - Only lights kitchen + living room (not bedrooms/bathrooms)
# - Softer brightness (~50%) and warm color temp (2700K)
# - Also protects against departing automation turning everything off
#
# The boolean (input_boolean.babysitter_mode) is the user-facing switch.
#
# This automation handles:
# - ON: Activate babysitter scene (soft warm kitchen + living room)
#       Disable presence automations so lights stay stable
#       Turn off conflicting modes
# - OFF: Turn off kitchen + living room lights, re-enable presence automations

id: '1772372585807'
alias: "Babysitter Mode Changed"
description: "Handle babysitter mode - soft warm lighting, disable presence automations"
mode: single

triggers:
  - trigger: state
    entity_id: input_boolean.babysitter_mode
    to: "on"
    id: babysitter_on
  - trigger: state
    entity_id: input_boolean.babysitter_mode
    to: "off"
    id: babysitter_off

actions:
  - choose:
      # Babysitter mode turned ON - soft warm lights in kitchen + living room
      - conditions:
          - condition: trigger
            id: babysitter_on
        sequence:
          # Disable mode automations FIRST (before turning off modes)
          - action: automation.turn_off
            target:
              entity_id:
                - automation.hobby_mode_changed
                - automation.cooking_mode_changed
                - automation.charlie_eating_mode_changed
                - automation.dad_eating_mode_changed
                - automation.working_mode_changed
                - automation.bathing_mode_changed
                - automation.tv_mode_auto
                - automation.cleaning_mode_changed
                - automation.lights_out_mode_changed

          # Babysitter ON turns off ALL other modes
          - action: input_boolean.turn_off
            target:
              entity_id:
                - input_boolean.cooking_mode
                - input_boolean.hobby_mode
                - input_boolean.charlie_eating_mode
                - input_boolean.dad_eating_mode
                - input_boolean.meditation_mode
                - input_boolean.working_mode
                - input_boolean.bathing_mode
                - input_boolean.tv_mode
                - input_boolean.cleaning_mode
                - input_boolean.lights_out_mode

          # Disable presence automations so lights stay stable
          - action: automation.turn_off
            target:
              entity_id:
                - automation.bathroom_motion
                - automation.living_room_presence_lighting
                - automation.kitchen_presence_lighting
                - automation.charlie_meal_presence_lighting
                - automation.bedroom_bathroom_presence_coupling

          # Activate babysitter scene (soft warm kitchen + living room)
          - action: scene.turn_on
            target:
              entity_id: scene.babysitter

      # Babysitter mode turned OFF - restore normal state
      - conditions:
          - condition: trigger
            id: babysitter_off
        sequence:
          # Turn off kitchen + living room lights
          - action: light.turn_off
            target:
              entity_id:
                - light.kitchen_lights
                - light.living_room_lights

          # Re-enable presence automations
          - action: automation.turn_on
            target:
              entity_id:
                - automation.bathroom_motion
                - automation.living_room_presence_lighting
                - automation.kitchen_presence_lighting
                - automation.charlie_meal_presence_lighting
                - automation.bedroom_bathroom_presence_coupling

          # Re-enable mode automations
          - action: automation.turn_on
            target:
              entity_id:
                - automation.hobby_mode_changed
                - automation.cooking_mode_changed
                - automation.charlie_eating_mode_changed
                - automation.dad_eating_mode_changed
                - automation.working_mode_changed
                - automation.bathing_mode_changed
                - automation.tv_mode_auto
                - automation.cleaning_mode_changed
                - automation.lights_out_mode_changed
