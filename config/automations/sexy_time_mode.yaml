# Sexy Time Mode State Handler
# Activates dim pink ambient lighting and music in the bedroom.
#
# The boolean (input_boolean.sexy_time_mode) is the user-facing switch.
#
# This automation handles:
# - ON: Activate sexy time scene (dim pink lamp, overheads off), resume HomePod at 35% volume
# - OFF: Turn off bedroom lights, pause HomePod

id: '1774794220764'
alias: "Sexy Time Mode Changed"
description: "Handle sexy time mode - dim pink lamp, overheads off, resume music on bedside HomePod"
mode: single

triggers:
  - trigger: state
    entity_id: input_boolean.sexy_time_mode
    to: "on"
    id: sexy_on
  - trigger: state
    entity_id: input_boolean.sexy_time_mode
    to: "off"
    id: sexy_off

actions:
  - choose:
      # Sexy time mode turned ON - dim pink lamp + music
      - conditions:
          - condition: trigger
            id: sexy_on
        sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.sexy_time
          - action: media_player.volume_set
            target:
              entity_id: media_player.bedroom_homepod_mini
            data:
              volume_level: 0.35
          - action: media_player.media_play
            target:
              entity_id: media_player.bedroom_homepod_mini

      # Sexy time mode turned OFF - lights off, pause music
      - conditions:
          - condition: trigger
            id: sexy_off
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.bedroom_lights
          - action: media_player.media_pause
            target:
              entity_id: media_player.bedroom_homepod_mini
