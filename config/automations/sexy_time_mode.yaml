# Sexy Time Mode State Handler
# Activates dim pink ambient lighting and music in the bedroom.
#
# The boolean (input_boolean.sexy_time_mode) is the user-facing switch.
#
# This automation handles:
# - ON: Scene (dim lamp, overheads off) + Hania Rani on bedroom HomePod at 35%
# - OFF: Lights off + pause music

id: '1774794220764'
alias: "Sexy Time Mode Changed"
description: "Activate/deactivate sexy time scene and bedroom music"
mode: single

triggers:
  - trigger: state
    entity_id: input_boolean.sexy_time_mode
    to: "on"
    id: sexy_on
  - trigger: state
    entity_id: input_boolean.sexy_time_mode
    to: "off"
    id: sexy_off

actions:
  - choose:
      # Sexy time mode turned ON - dim pink lamp + music
      - conditions:
          - condition: trigger
            id: sexy_on
        sequence:
          - action: scene.turn_on
            target:
              entity_id: scene.sexy_time
          - action: media_player.volume_set
            target:
              entity_id: media_player.bedroom_3
            data:
              volume_level: 0.35
          - action: music_assistant.play_media
            data:
              entity_id: media_player.bedroom_3
              media_id: Hania Rani
              media_type: artist

      # Sexy time mode turned OFF - lights off, pause music
      - conditions:
          - condition: trigger
            id: sexy_off
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.bedroom_lights
          - action: media_player.media_pause
            target:
              entity_id: media_player.bedroom_3
