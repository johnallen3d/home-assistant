id: "1771251368598"
alias: "Matter Server Watchdog"
description: >-
  Monitors Matter Server for nodes that are truly stuck — where the last
  subscription event is a failure with no subsequent recovery. Nodes that
  fail and self-recover (normal Thread mesh jitter) are ignored. Only
  triggers when a node is genuinely stuck and needs a server restart.
  Sends an actionable notification with a Restart Now button. If not
  tapped within 10 minutes, re-checks and auto-restarts only if nodes
  are still stuck.
triggers:
  - trigger: numeric_state
    entity_id: sensor.matter_subscription_failures
    above: 0
conditions: []
actions:
  - variables:
      stuck_count: "{{ states('sensor.matter_subscription_failures') }}"
      action_restart: "{{ 'MATTER_RESTART_' ~ context.id }}"
  - action: notify.mobile_app_john_allens_iphone
    data:
      title: "Matter Node Stuck"
      message: >-
        {{ stuck_count }} Matter node(s) stuck — failed subscription with
        no recovery. Will auto-restart in 10 minutes if still stuck.
      data:
        push:
          sound:
            name: default
            critical: 0
            volume: 0.5
        actions:
          - action: "{{ action_restart }}"
            title: "Restart Now"
            destructive: true
            icon: "sfsymbols:arrow.clockwise"
  - wait_for_trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_restart }}"
    timeout:
      minutes: 10
  - choose:
      - conditions: "{{ wait.trigger is not none }}"
        sequence:
          - action: hassio.addon_restart
            data:
              addon: core_matter_server
          - delay:
              seconds: 30
          - action: notify.mobile_app_john_allens_iphone
            data:
              title: "Matter Server Restarted"
              message: "Restarted Matter Server (manual)."
    default:
      - condition: numeric_state
        entity_id: sensor.matter_subscription_failures
        above: 0
      - action: hassio.addon_restart
        data:
          addon: core_matter_server
      - delay:
          seconds: 30
      - action: notify.mobile_app_john_allens_iphone
        data:
          title: "Matter Server Restarted"
          message: >-
            Auto-restarted Matter Server — {{ stuck_count }} node(s)
            still stuck after 10 minutes.
mode: single
