# Living Room Presence Lighting
# Turns living room lights on/off based on FP2 presence sensor living room zone
#
# On entry: Uses adaptive lighting on lamp only (no overhead presence control)
# On exit: Turns lights off immediately (no delay)
# Lights Out Mode: When input_boolean.lights_out_mode is ON, lights stay off.

id: '1765490534742'
alias: "Living Room Presence Lighting"
description: "Adaptive living room lights based on FP2 presence detection"
mode: single

triggers:
  - trigger: state
    entity_id: binary_sensor.kitchen_presence_living_room
    to: "on"
    id: presence_on
  - trigger: state
    entity_id: binary_sensor.kitchen_presence_living_room
    to: "off"
    id: presence_off

actions:
  - choose:
      # Presence detected - adaptive lighting unless TV/eating mode active
      - conditions:
          - condition: trigger
            id: presence_on
          # Skip if lights out mode is on (presence should not turn on lights)
          - condition: state
            entity_id: input_boolean.lights_out_mode
            state: "off"
          # Skip if eating mode is on (scene is already set, don't overwrite it)
          - condition: state
            entity_id: input_boolean.dad_eating_mode
            state: "off"
          # tv_mode on means presence must not fight TV lighting.
          - condition: state
            entity_id: input_boolean.tv_mode
            state: "off"
        sequence:
          - choose:
              # Alarm enabled: dim pink on lamp only, no overhead (match bathroom night mode)
              - conditions:
                  - condition: state
                    entity_id: input_boolean.alarm_enabled
                    state: "on"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: light.living_room_light
                    data:
                      brightness_pct: 10
                      rgb_color: [255, 159, 242]
            # Alarm disabled: normal adaptive/night lighting
            default:
              - variables:
                  brightness: 60
                  color_temp: 2700
                  hour: "{{ now().hour }}"
                  is_night: "{{ hour >= 23 or hour < 6 }}"
                  night_brightness: 15
              - choose:
                  # Night mode: dim warm
                  - conditions: "{{ is_night }}"
                    sequence:
                      - action: light.turn_on
                        target:
                          entity_id: light.living_room_light
                        data:
                          brightness_pct: "{{ night_brightness }}"
                          color_temp_kelvin: 2200
                # Default: adaptive mode
                default:
                  - action: light.turn_on
                    target:
                      entity_id: light.living_room_light
                    data:
                      brightness_pct: "{{ brightness }}"
                      color_temp_kelvin: "{{ color_temp }}"

      # Presence cleared - turn off (unless hobby mode, eating mode, or TV is on)
      - conditions:
          - condition: trigger
            id: presence_off
        sequence:
          # Skip if hobby mode is on (user is working on a project)
          - condition: state
            entity_id: input_boolean.hobby_mode
            state: "off"
          # Skip if eating mode is on (Charlie's meal in progress)
          - condition: state
            entity_id: input_boolean.charlie_eating_mode
            state: "off"
          # Skip if dad eating mode is on (Dad's meal in progress)
          - condition: state
            entity_id: input_boolean.dad_eating_mode
            state: "off"
          # tv_mode on means presence must not fight TV lighting.
          - condition: state
            entity_id: input_boolean.tv_mode
            state: "off"
          - action: light.turn_off
            target:
              entity_id: light.living_room_light
